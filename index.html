<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Deloitte — Login</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, Helvetica, sans-serif;
}

body{
  background:#e8e8e8;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

header{
  background:#000;
  color:#fff;
  padding:24px 40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  position:relative;
}

.logo{
  font-size:28px;
  font-weight:bold;
}

.logo span{
  color:#86BC25;
}

nav{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
}

nav a{
  color:#fff;
  text-decoration:none;
  font-size:14px;
}

nav a:hover{
  color:#86BC25;
}

.login-top{
  position:absolute;
  top:8px;
  right:40px;
  color:#86BC25;
  font-size:12px;
  text-decoration:none;
}

main{
  flex:1;
  padding:40px 16px;
}

.card{
  background:#fff;
  max-width:1100px;
  margin:auto;
  padding:40px;
  width:100%;
}

h1{
  text-align:center;
  font-size:28px;
  font-weight:400;
  margin-bottom:24px;
}

h2{
  font-size:20px;
  margin-bottom:24px;
}

.row{
  display:flex;
  gap:24px;
  flex-wrap:wrap;
  align-items:flex-end;
}

.row > div{
  flex:1;
  min-width:220px;
}

label{
  display:block;
  font-size:14px;
  font-weight:bold;
  margin-bottom:4px;
}

input{
  width:100%;
  height:38px;
  border:1px solid #999;
  padding:0 10px;
  font-size:14px;
}

input:focus{
  outline:none;
  border-color:#0076A8;
}

button{
  background:#0076A8;
  color:#fff;
  border:none;
  padding:10px 30px;
  border-radius:3px;
  cursor:pointer;
  font-weight:bold;
  font-size:14px;
  height:40px;
}

button:hover{
  background:#005f87;
}

.err{
  color:#c00;
  margin-top:16px;
  font-size:14px;
}

.forgot{
  display:inline-block;
  margin-top:24px;
  color:#0076A8;
  text-decoration:none;
  font-size:14px;
}

.back{
  display:inline-block;
  margin-top:60px;
  font-weight:bold;
  text-decoration:none;
  color:#000;
  font-size:14px;
}

#pdfFrame{
  width:100%;
  height:85vh;
  border:none;
}

.dl{
  display:inline-block;
  margin-top:20px;
  background:#0076A8;
  color:#fff;
  padding:10px 20px;
  border-radius:3px;
  text-decoration:none;
  font-weight:bold;
}

footer .links{
  background:#d0d0d0;
  padding:24px;
  text-align:center;
  font-size:13px;
}

footer .links a{
  color:#444;
  text-decoration:none;
  margin:0 6px;
}

footer .legal{
  background:#fff;
  padding:24px 40px;
  font-size:12px;
  color:#555;
  line-height:1.5;
}

/* MOBILE */

@media(max-width:768px){

  header{
    padding:20px;
    gap:16px;
  }

  .login-top{
    position:static;
    width:100%;
    text-align:right;
  }

  nav{
    width:100%;
    justify-content:center;
  }

  .card{
    padding:24px 18px;
  }

  .row{
    flex-direction:column;
    align-items:stretch;
  }

  button{
    width:100%;
  }

  #pdfFrame{
    height:70vh;
  }

  footer .legal{
    padding:20px;
  }

}

</style>
</head>

<body>

<header>

  <div class="logo">
    Deloitte<span>.</span>
  </div>

  <a href="#" class="login-top">Login</a>

  <nav>
    <a href="#">Home</a>
    <a href="#">Jobs ▾</a>
    <a href="#">Events</a>
  </nav>

</header>

<main>

  <!-- LOGIN VIEW -->

  <div class="card" id="loginView">

    <h1>Login</h1>

    <h2>Are you already registered?</h2>

    <form id="loginForm">

      <div class="row">

        <div>
          <label>Username</label>
          <input type="text" id="username">
        </div>

        <div>
          <label>Password</label>
          <input type="password" id="password">
        </div>

        <button type="submit">
          Log in
        </button>

      </div>

      <p class="err" id="err" style="display:none">
        Invalid username or password.
      </p>

      <a href="#" class="forgot">
        Forgot your password?
      </a>

      <div>
        <a href="#" class="back">
          ‹ Back to home
        </a>
      </div>

    </form>

  </div>

  <!-- PDF VIEW -->

  <div class="card" id="pdfView" style="display:none">

    <h1>Your Offer Letter</h1>

    <iframe id="pdfFrame"></iframe>

    <a class="dl" id="dlLink" href="" download>
      Download PDF
    </a>

  </div>

</main>

<footer>

  <div class="links">

    <a href="#">About Deloitte</a> |
    <a href="#">Terms of use</a> |
    <a href="#">Privacy</a> |
    <a href="#">Data Privacy Framework</a> |
    <a href="#">Cookies</a>

  </div>

  <div class="legal">

    <p>
      © 2026 Deloitte.
    </p>

  </div>

</footer>

<script>

// ===== LOGIN DETAILS =====

const VALID_USERNAME = "akshatgupta955";
const VALID_PASSWORD = "akshat@123";

const PDF_URL = "offer-letter.pdf";

// =========================

document
.getElementById("loginForm")
.addEventListener("submit", function(e){

  e.preventDefault();

  const u =
    document.getElementById("username").value;

  const p =
    document.getElementById("password").value;

  if(
    u === VALID_USERNAME &&
    p === VALID_PASSWORD
  ){

    document.getElementById("loginView")
    .style.display = "none";

    document.getElementById("pdfView")
    .style.display = "block";

    // PDF.JS VIEWER

    document.getElementById("pdfFrame").src =
    "https://mozilla.github.io/pdf.js/web/viewer.html?file=" +
    encodeURIComponent(window.location.origin + "/" + PDF_URL);

    // DOWNLOAD BUTTON

    document
    .getElementById("dlLink")
    .setAttribute("href", PDF_URL);

  }

  else{

    document.getElementById("err")
    .style.display = "block";

  }

});

</script>

</body>
</html>
